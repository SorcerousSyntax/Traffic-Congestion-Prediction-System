services:
  - type: web
    name: traffic-congestion-api
    env: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"
    autoDeploy: true